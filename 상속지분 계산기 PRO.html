<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상속지분 계산기 PRO</title>
  
  <!-- React 및 Babel 라이브러리 로드 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS 로드 및 다크모드 설정 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>

  <!-- 멋진 필기체 폰트 로드 (워터마크용) -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">

  <style>
    /* 💡 베이스 설정: 폴더 디자인이 돋보이도록 배경색을 옅은 회색으로 변경 */
    body {
      color: #37352f;
      background-color: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      transition: background-color 0.2s, color 0.2s;
    }

    /* 다크모드 기본 배경/글자색 강제 적용 (Tailwind와 별개로 베이스 보정) */
    .dark body {
      background-color: #202020; /* Dark Gray base */
      color: #ffffff; /* High contrast white */
    }

    /* 포커스 시 노션 특유의 블루 링 */
    input:focus, select:focus, button:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(35, 131, 226, 0.3);
      border-color: #2383e2 !important;
    }
    
    /* 인풋 그룹 포커스 효과 */
    .input-combo:focus-within {
      border-color: #2383e2 !important;
      box-shadow: 0 0 0 2px rgba(35, 131, 226, 0.3);
    }

    .designer-sign {
      font-family: 'Dancing Script', cursive;
      font-size: 16px;
      color: #d4d4d4;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-left: 8px;
    }

    /* 커스텀 스크롤바 */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d3d1cb; border-radius: 5px; border: 2px solid white; }
    ::-webkit-scrollbar-thumb:hover { background: #aeaca6; }
    
    .dark ::-webkit-scrollbar-thumb { background: #475569; border-color: #1e293b; }

    /* 💡 브라우저 인쇄 레이아웃 최적화 - 전용 보고서만 인쇄 */
    @media print {
      /* 기본: 모든 요소 흰 배경 강제 */
      *, *::before, *::after { 
        background-color: transparent !important; 
        color: black !important; 
        box-shadow: none !important; 
        text-shadow: none !important; 
      }
      html, body { 
        background-color: white !important; 
        color: #000000 !important;
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact; 
        font-size: 11pt !important;
        padding: 0 !important; margin: 0 !important;
        min-width: 100% !important;
      }
      .dark body { background-color: white !important; color: black !important; }
      
      @page { margin: 15mm 12mm; }
      
      /* 화면 UI 전부 숨기기 */
      .no-print, .screen-only { display: none !important; }
      
      /* 인쇄 전용 영역만 표시 */
      .print-report-container { 
        display: block !important; 
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      
      /* 인쇄 전용 표 스타일 */
      .print-report-container table { border-collapse: collapse !important; width: 100% !important; }
      .print-report-container th, .print-report-container td { border: 1px solid #333 !important; padding: 6px 10px !important; color: black !important; }
      .print-report-container th { background-color: #f0f0f0 !important; font-weight: bold !important; }
      .print-report-container .sub-group-header td { background-color: #f8f8f8 !important; }
      
      #print-footer {
        position: fixed; bottom: 0; right: 0;
        font-family: 'Dancing Script', cursive; font-size: 14pt;
        color: #bbb !important; text-align: right; display: block !important;
      }
    }
  </style>
</head>
<body class="min-w-[1200px] print:min-w-0 transition-colors duration-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { flushSync } = ReactDOM; 

    // --- 아이콘 세트 ---
    const IconCalculator = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></svg>;
    const IconUserPlus = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>;
    const IconTrash2 = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
    const IconChevronRight = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="m9 18 6-6-6-6"/></svg>;
    const IconSave = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const IconFolderOpen = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/></svg>;
    const IconPrinter = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const IconCalendarDays = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconNetwork = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>;
    const IconTable = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0H5a2 2 0 0 1-2-2V9m6 12h10a2 2 0 0 0 2-2V9m-18 0h20"/></svg>;
    const IconList = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
    const IconReset = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const IconSun = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41m12.72-12.72l-1.41 1.41"/></svg>;
    const IconMoon = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
    const IconFileText = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
    const IconXCircle = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><path strokeLinecap="round" strokeLinejoin="round" d="m15 9-6 6m0-6 6 6"/></svg>;

    // --- 💡 간이 입력 + 아이콘 컴포넌트 ---
    const IconPlus = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M12 5v14m-7-7h14"/></svg>;

    // --- 가계도 요약 사이드바 컴포넌트 (간이 입력 버튼 포함) ---
    const MiniTreeSidebar = ({ node, level = 0, onQuickAdd }) => {
      if (!node) return null;

      // 🎨 항렬별/상태별 색상 정의
      const getLevelColor = (lvl, isDead) => {
        if (isDead) return 'text-[#ef4444] dark:text-red-500 font-black'; // 사망자는 무조건 빨간색
        if (lvl === 0) return 'text-[#0ea5e9] dark:text-sky-400 font-black'; // 피상속인
        if (lvl === 1) return 'text-[#22c55e] dark:text-green-400 font-bold'; // 1대
        if (lvl === 2) return 'text-[#f97316] dark:text-orange-400 font-bold'; // 2대
        return 'text-[#a855f7] dark:text-purple-400 font-bold'; // 3대 이상
      };

      const nameColorClass = getLevelColor(level, node.isDeceased);
      // 💡 피상속인(root) 또는 사망자 노드에만 + 버튼 표시
      const showAddBtn = (level === 0 || node.isDeceased);

      return (
        <div className={`flex flex-col ${level > 0 ? 'ml-3' : ''}`}>
          <div className="flex items-center gap-1.5 py-0.5 group/sidebar">
            {level > 0 && <span className="text-[#d4d4d4] dark:text-[#555555] text-[11px] shrink-0 font-bold">└</span>}
            <span className={`text-[12px] truncate transition-colors ${nameColorClass} ${node.isDeceased ? 'line-through opacity-80' : ''}`}>
              {node.name || (level === 0 ? '피상속인' : '(이름 없음)')}
            </span>
            {level > 0 && <span className={`text-[10px] font-medium shrink-0 ${node.isDeceased ? 'text-[#ef4444]/70 dark:text-red-500/70' : 'text-[#787774] dark:text-[#777777]'}`}>({relStr[node.relation] || '자녀'})</span>}
            {/* 💡 간이 입력 + 버튼 */}
            {showAddBtn && onQuickAdd && (
              <button
                onClick={(e) => { e.stopPropagation(); onQuickAdd(node.id, node.name); }}
                className="opacity-0 group-hover/sidebar:opacity-100 w-4 h-4 flex items-center justify-center rounded bg-[#2383e2] dark:bg-[#0e639c] text-white hover:bg-[#0073ea] dark:hover:bg-[#1177bb] transition-all shrink-0 ml-1"
                title={`${node.name || '피상속인'}의 상속인 간이 추가`}
              >
                <IconPlus className="w-3 h-3" />
              </button>
            )}
          </div>
          {node.heirs && node.heirs.length > 0 && (
            <div className="border-l border-[#e9e9e7] dark:border-[#444444] ml-1.5 pl-1.5 pb-0.5 transition-colors">
              {node.heirs.map((h, i) => (
                <MiniTreeSidebar key={h.id || i} node={h} level={level + 1} onQuickAdd={onQuickAdd} />
              ))}
            </div>
          )}
        </div>
      );
    };

    // --- 💡 간이 입력 팝업 컴포넌트 ---
    const QuickAddPopup = ({ targetId, targetName, onClose, onAdd, gender }) => {
      const [inputValue, setInputValue] = useState('');
      const inputRef = React.useRef(null);

      // 💡 포커스 자동 이동
      useEffect(() => {
        if (inputRef.current) inputRef.current.focus();
      }, []);

      // 💡 입력 파싱: "이름숫자" → { name, relation }
      // 1=배우자, 2=아들, 3=딸, 4=형제자매
      const parseInput = (line) => {
        const trimmed = line.trim();
        if (!trimmed) return null;
        const lastChar = trimmed.slice(-1);
        const numMap = { '1': 'spouse', '2': 'son', '3': 'daughter', '4': 'sibling' };
        if (numMap[lastChar]) {
          const name = trimmed.slice(0, -1).trim();
          let relation = numMap[lastChar];
          // 💡 배우자인 경우 성별에 따라 처/남편 구분
          if (relation === 'spouse') {
            relation = (gender === 'female') ? 'husband' : 'wife';
          }
          return { name, relation };
        }
        // 숫자가 없으면 기본적으로 아들(son)로 인식
        return { name: trimmed, relation: 'son' };
      };

      const handleSubmit = () => {
        const lines = inputValue.split('\n');
        const parsed = lines.map(parseInput).filter(Boolean);
        if (parsed.length === 0) return;
        parsed.forEach(p => onAdd(targetId, p.name, p.relation));
        onClose();
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Escape') { e.preventDefault(); onClose(); }
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
      };

      return (
        <div className="fixed inset-0 bg-black/30 dark:bg-black/60 z-[9999] flex items-center justify-center backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white dark:bg-[#2b2b2b] rounded-lg shadow-2xl border border-[#e9e9e7] dark:border-[#444444] p-5 w-[380px] animate-in fade-in zoom-in duration-200" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-[15px] font-bold text-[#37352f] dark:text-[#ffffff] flex items-center gap-2">
                <IconUserPlus className="w-4 h-4 text-[#2383e2] dark:text-[#60a5fa]" />
                <span className="text-[#0b6e99] dark:text-[#7dd3fc]">{targetName || '피상속인'}</span>의 상속인 간이 추가
              </h3>
              <button onClick={onClose} className="text-[#a3a3a3] dark:text-[#777] hover:text-[#c93f3a] dark:hover:text-red-400 transition-colors">
                <IconXCircle className="w-5 h-5" />
              </button>
            </div>
            <div className="bg-[#f7f7f5] dark:bg-[#333333] rounded-md p-3 mb-3 text-[12px] text-[#787774] dark:text-[#cccccc] leading-relaxed border border-[#e9e9e7] dark:border-[#444444]">
              <strong className="text-[#37352f] dark:text-[#ffffff]">입력 형식:</strong> 이름 + 숫자 (한 줄에 한 명)<br/>
              <span className="text-[#2383e2] dark:text-[#60a5fa] font-bold">1</span>=배우자 &nbsp;
              <span className="text-[#22c55e] dark:text-[#4ade80] font-bold">2</span>=아들 &nbsp;
              <span className="text-[#f97316] dark:text-[#fb923c] font-bold">3</span>=딸 &nbsp;
              <span className="text-[#a855f7] dark:text-[#c084fc] font-bold">4</span>=형제자매<br/>
              예: <code className="bg-white dark:bg-[#2b2b2b] px-1 rounded text-[#0b6e99] dark:text-[#7dd3fc] font-bold">이몽분1</code> → 이몽분(배우자), <code className="bg-white dark:bg-[#2b2b2b] px-1 rounded text-[#0b6e99] dark:text-[#7dd3fc] font-bold">이용임2</code> → 이용임(아들)
            </div>
            <textarea
              ref={inputRef}
              value={inputValue}
              onChange={e => setInputValue(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="이몽분1&#10;이용임2&#10;이용남3"
              className="w-full h-24 border border-[#cccccc] dark:border-[#555555] rounded-md p-3 text-[14px] font-bold text-[#37352f] dark:text-[#ffffff] bg-white dark:bg-[#333333] outline-none focus:border-[#2383e2] dark:focus:border-[#0e639c] resize-none placeholder:text-[#c4c4c4] dark:placeholder:text-[#666666] transition-colors"
            />
            <div className="flex justify-end gap-2 mt-3">
              <button onClick={onClose} className="px-4 py-2 bg-white dark:bg-[#333333] border border-[#d4d4d4] dark:border-[#555555] text-[#504f4c] dark:text-[#ffffff] font-bold rounded-md hover:bg-[#f1f1ef] dark:hover:bg-[#444444] transition-colors text-[13px]">취소</button>
              <button onClick={handleSubmit} className="px-4 py-2 bg-[#2383e2] dark:bg-[#0e639c] text-white font-bold rounded-md hover:bg-[#0073ea] dark:hover:bg-[#1177bb] transition-colors text-[13px] shadow-md">추가</button>
            </div>
          </div>
        </div>
      );
    };

    // --- 수학 및 법률 엔진 ---
    const math = {
      gcd: (a, b) => {
        a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b));
        if (b === 0) return a; return math.gcd(b, a % b);
      },
      lcm: (a, b) => {
        if (a === 0 || b === 0) return 0;
        return (a / math.gcd(a, b)) * b;
      },
      simplify: (n, d) => {
        if (n === 0) return [0, 1];
        const nInt = Math.round(n); const dInt = Math.round(d);
        const g = math.gcd(Math.abs(nInt), Math.abs(dInt));
        return [nInt / g, dInt / g];
      },
      multiply: (n1, d1, n2, d2) => math.simplify(n1 * n2, d1 * d2),
      add: (n1, d1, n2, d2) => {
        if (n1 === 0) return [n2, d2];
        if (n2 === 0) return [n1, d1];
        const commonD = d1 * d2;
        const newN = (n1 * d2) + (n2 * d1);
        return math.simplify(newN, commonD);
      }
    };

    const relStr = { 'wife': '처', 'husband': '남편', 'son': '아들', 'daughter': '딸', 'sibling': '형제자매' };

    const getLawEra = (deathDate) => {
      if (!deathDate || deathDate.length < 4) return '1991';
      const year = parseInt(deathDate.split('-')[0], 10);
      if (year < 1979) return '1960';
      if (year < 1991) return '1979';
      return '1991';
    };

    const isBefore = (d1, d2) => {
      if (!d1 || !d2 || d1.length < 10 || d2.length < 10) return false;
      return new Date(d1) < new Date(d2);
    };

    const formatKorDate = (dStr) => {
      if (!dStr || dStr.length !== 10) return dStr;
      const [y, m, d] = dStr.split('-');
      return `${y}년 ${parseInt(m, 10)}월 ${parseInt(d, 10)}일`;
    };

    // 💡 숫자에 천 단위 콤마를 찍어주는 포맷터 함수
    const formatMoney = (val) => {
      if (!val) return '';
      return Number(val).toLocaleString('ko-KR');
    };

    // --- 컴포넌트: 날짜 입력 ---
    const DateInput = ({ value, onChange, placeholder, className, onKeyDown }) => {
      const format = (v) => {
        let val = v.replace(/\D/g, '').slice(0, 8);
        if (val.length > 6) return `${val.slice(0, 4)}-${val.slice(4, 6)}-${val.slice(6, 8)}`;
        if (val.length > 4) return `${val.slice(0, 4)}-${val.slice(4)}`;
        return val;
      };
      return <input type="text" value={value || ''} onKeyDown={onKeyDown} onChange={e => onChange(format(e.target.value))} onFocus={e => e.target.select()} placeholder={placeholder || "YYYY-MM-DD"} className={`${className} dark:bg-[#333333] dark:border-[#555555] dark:text-[#ffffff] transition-colors`} />;
    };

    // 💡 부드러운 파스텔 녹색 -> 파란색 -> 보라색 -> 핑크색 그라데이션 확장 적용 (계층 구분)
    const getLevelStyle = (level) => {
      if (level === 1) return "bg-[#f0fdf4] dark:bg-green-900/20 border-[#bbf7d0] dark:border-green-800/30"; // 1차: 연녹색
      if (level === 2) return "bg-[#ecfeff] dark:bg-cyan-900/20 border-[#a5f3fc] dark:border-cyan-800/30"; // 2차: 연청록
      if (level === 3) return "bg-[#eff6ff] dark:bg-blue-900/20 border-[#bfdbfe] dark:border-blue-800/30"; // 3차: 연파랑
      if (level === 4) return "bg-[#eef2ff] dark:bg-indigo-900/20 border-[#c7d2fe] dark:border-indigo-800/30"; // 4차: 연남색
      if (level === 5) return "bg-[#faf5ff] dark:bg-purple-900/20 border-[#e9d5ff] dark:border-purple-800/30"; // 5차: 연보라
      if (level === 6) return "bg-[#fdf4ff] dark:bg-fuchsia-900/20 border-[#fbcfe8] dark:border-fuchsia-800/30"; // 6차: 연분홍
      return "bg-[#fff1f2] dark:bg-rose-900/20 border-[#fecdd3] dark:border-rose-800/30";                  // 7차 이상: 연장미
    };

    // 💡 계층 깊이에 따른 연결선 색상 지정 (5~6단계 이상 확장)
    const getLineStyle = (level) => {
      if (level === 2) return "border-[#22d3ee] dark:border-cyan-700"; // 2차 연결선: 청록색
      if (level === 3) return "border-[#60a5fa] dark:border-blue-700"; // 3차 연결선: 파란색
      if (level === 4) return "border-[#818cf8] dark:border-indigo-700"; // 4차 연결선: 남색
      if (level === 5) return "border-[#a855f7] dark:border-purple-700"; // 5차 연결선: 보라색
      if (level === 6) return "border-[#e879f9] dark:border-fuchsia-700"; // 6차 연결선: 분홍색
      return "border-[#fb7185] dark:border-rose-700";                  // 7차 이상 연결선: 장미색
    };

    // --- 상속인 입력 블록 ---
    const HeirRow = ({ node, level, handleUpdate, removeHeir, addHeir, siblings, inheritedDate, onKeyDown, toggleSignal }) => {
      const isSp = node.relation === 'wife' || node.relation === 'husband';
      const isSon = node.relation === 'son';
      const isDaughter = node.relation === 'daughter';
      const canAutoFill = node.isDeceased && isSp && (!node.heirs || node.heirs.length === 0) && siblings?.length > 0;

      // 💡 접기/펼치기 상태 추가
      const [isExpanded, setIsExpanded] = useState(true);

      // 💡 상위 컴포넌트(App)에서 보내는 모두 펼치기/접기 신호 감지
      useEffect(() => {
        if (toggleSignal > 0) setIsExpanded(true);
        else if (toggleSignal < 0) setIsExpanded(false);
      }, [toggleSignal]);

      // 💡 상속 개시일에 따른 법령 판단 (1991년 이후면 호주상속, 동일가적 옵션 숨김)
      const lawEra = getLawEra(inheritedDate);
      const showHoju = isSon && lawEra !== '1991';
      const showMarriedDaughter = isDaughter && lawEra !== '1991';

      // 💡 형제 중 이미 호주상속을 받은 사람이 있는지 확인
      const hasOtherHoju = siblings?.some(s => s.id !== node.id && s.isHoju);

      // 💡 하위 상속인(대습/순차)에게 물려줄 기준 상속 개시일 계산
      let nextInheritedDate = inheritedDate;
      if (node.isDeceased && node.deathDate && !isBefore(node.deathDate, inheritedDate)) {
        nextInheritedDate = node.deathDate;
      }

      const autoFill = () => {
        const children = siblings.filter(s => s.relation === 'son' || s.relation === 'daughter');
        const clone = (n) => ({ ...n, id: `auto_${Math.random().toString(36).substr(2,9)}`, heirs: n.heirs?.map(clone) || [] });
        handleUpdate(node.id, 'heirs', children.map(clone));
      };

      const boxStyle = getLevelStyle(level);
      const lineStyle = getLineStyle(level);

      return (
        <div className={`mt-2 ${level > 1 ? `ml-8 pl-4 border-l-[3px] ${lineStyle}` : ''}`}>
          <div className={`${boxStyle} border rounded-md p-2.5 hover:shadow-sm transition-colors relative nav-row no-print group flex items-center`}>
            
            {/* 💡 기존 삭제 버튼 자리에 펼치기/접기 버튼 배치 (사망 시에만 표시) */}
            <div className="w-7 flex justify-center shrink-0 mr-1">
              {node.isDeceased && (
                <button type="button" onClick={() => setIsExpanded(!isExpanded)} className="text-[#787774] dark:text-[#ffffff] hover:bg-black/5 dark:hover:bg-white/10 p-1 rounded transition-colors" title={isExpanded ? "접기" : "펼치기"}>
                  <IconChevronRight className={`w-5 h-5 transition-transform ${isExpanded ? 'rotate-90' : ''}`} />
                </button>
              )}
            </div>

            {/* 입력 항목 가로 밀착 배치 (글씨 크기 및 패딩 일관성 정돈) */}
            <div className="flex items-center gap-2 flex-nowrap w-full">
              
              {/* 성명 */}
              <div className="flex items-center bg-white dark:bg-[#2b2b2b] border border-[#cccccc] dark:border-[#555555] rounded-md overflow-hidden input-combo transition-colors">
                <span className="bg-[#f1f1ef] dark:bg-[#333333] text-[#504f4c] dark:text-[#ffffff] font-semibold px-3 py-1.5 text-[13px] border-r border-[#cccccc] dark:border-[#555555] transition-colors">성명</span>
                <input type="text" placeholder="성명" value={node.name} onKeyDown={onKeyDown} onChange={e => handleUpdate(node.id, 'name', e.target.value)} onFocus={e => e.target.select()} 
                  className="w-24 px-3 py-1.5 text-[14px] font-bold text-[#0b6e99] dark:text-[#7dd3fc] outline-none bg-transparent" />
              </div>
              
              {/* 관계 */}
              <div className="flex items-center bg-white dark:bg-[#2b2b2b] border border-[#cccccc] dark:border-[#555555] rounded-md overflow-hidden relative input-combo transition-colors">
                <span className="bg-[#f1f1ef] dark:bg-[#333333] text-[#504f4c] dark:text-[#ffffff] font-semibold px-3 py-1.5 text-[13px] border-r border-[#cccccc] dark:border-[#555555] transition-colors">관계</span>
                <select value={node.relation} onKeyDown={onKeyDown} onChange={e => handleUpdate(node.id, 'relation', e.target.value)} 
                  className="w-24 px-3 py-1.5 text-[14px] font-semibold text-[#37352f] dark:text-[#ffffff] bg-transparent outline-none cursor-pointer appearance-none">
                  <option value="wife" className="dark:bg-[#2b2b2b]">처</option><option value="husband" className="dark:bg-[#2b2b2b]">남편</option><option value="son" className="dark:bg-[#2b2b2b]">아들</option><option value="daughter" className="dark:bg-[#2b2b2b]">딸</option><option value="sibling" className="dark:bg-[#2b2b2b]">형제자매</option>
                </select>
                <div className="pointer-events-none absolute inset-y-0 right-2 flex items-center text-[#787774] dark:text-[#ffffff]"><IconChevronRight className="w-4 h-4 rotate-90" /></div>
              </div>

              {/* 호주 / 동일가적 옵션 */}
              <div className="flex items-center gap-2 pl-1">
                {showHoju && (
                  <label className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md border transition-colors select-none ${
                    node.isHoju 
                      ? 'bg-[#bfdbfe] dark:bg-sky-900/40 border-[#93c5fd] dark:border-sky-800/50 text-[#1d4ed8] dark:text-[#7dd3fc] cursor-pointer' 
                      : hasOtherHoju 
                        ? 'bg-[#f1f1ef] dark:bg-[#333333] border-[#e9e9e7] dark:border-[#555555] text-[#a3a3a3] dark:text-[#cccccc] cursor-not-allowed opacity-70' 
                        : 'bg-white dark:bg-[#333333] border-[#cccccc] dark:border-[#555555] hover:bg-[#f1f1ef] dark:hover:bg-[#3c3c3c] text-[#787774] dark:text-[#ffffff] cursor-pointer'
                  }`}>
                    <input 
                      type="checkbox" 
                      checked={node.isHoju || false} 
                      disabled={hasOtherHoju && !node.isHoju}
                      onKeyDown={onKeyDown} 
                      onChange={e => handleUpdate(node.id, 'isHoju', e.target.checked)} 
                      className={`w-3.5 h-3.5 accent-[#be185d] ${hasOtherHoju && !node.isHoju ? 'cursor-not-allowed grayscale' : 'cursor-pointer'}`} 
                    />
                    <span className="text-[13px] font-bold">호주상속</span>
                  </label>
                )}
                
                {showMarriedDaughter && (
                  <label className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md border transition-colors cursor-pointer select-none ${node.isSameRegister !== false ? 'bg-[#f3f0ff] dark:bg-fuchsia-900/40 border-[#d9cfff] dark:border-fuchsia-800/50 text-[#402c84] dark:text-fuchsia-300' : 'bg-[#ffedd5] dark:bg-amber-900/40 border-[#fed7aa] dark:border-amber-800/50 text-[#ea580c] dark:text-[#fcd34d]'}`}>
                    <input type="checkbox" checked={node.isSameRegister !== false} onKeyDown={onKeyDown} onChange={e => handleUpdate(node.id, 'isSameRegister', e.target.checked)} className={`w-3.5 h-3.5 cursor-pointer ${node.isSameRegister !== false ? 'accent-[#402c84]' : 'accent-[#ea580c]'}`} />
                    <span className="text-[13px] font-bold">동일가적</span>
                  </label>
                )}

                {showMarriedDaughter && node.isSameRegister === false && (
                  <div className="flex items-center bg-white dark:bg-[#2b2b2b] border border-[#fed7aa] dark:border-amber-800/50 rounded-md overflow-hidden input-combo ml-1 transition-colors">
                    <span className="bg-[#ffedd5] dark:bg-amber-900/40 text-[#ea580c] dark:text-[#fcd34d] font-semibold px-3 py-1.5 text-[13px] border-r border-[#fed7aa] dark:border-amber-800/50 transition-colors">혼인일</span>
                    <DateInput value={node.marriageDate} onKeyDown={onKeyDown} onChange={v => handleUpdate(node.id, 'marriageDate', v)} className="w-28 px-3 py-1.5 text-[14px] font-semibold outline-none text-[#37352f] dark:text-[#ffffff] bg-transparent" />
                  </div>
                )}
              </div>

              {/* 💡 눈 아프지 않은 옅은 사망 버튼 (크기 통일) */}
              <label className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md border cursor-pointer transition-colors ml-auto select-none ${node.isDeceased ? 'bg-[#ffe2dd] dark:bg-rose-900/40 border-[#f0c0b9] dark:border-rose-800/50 text-[#c93f3a] dark:text-[#fb7185]' : 'bg-white dark:bg-[#333333] border-[#cccccc] dark:border-[#555555] hover:bg-[#f1f1ef] dark:hover:bg-[#3c3c3c] text-[#787774] dark:text-[#ffffff]'}`}>
                <input type="checkbox" checked={node.isDeceased || false} onKeyDown={onKeyDown} onChange={e => handleUpdate(node.id, 'isDeceased', e.target.checked)} className="w-4 h-4 cursor-pointer accent-[#c93f3a]" />
                <span className="text-[13px] font-bold">사망</span>
              </label>

              {node.isDeceased && (
                <div className="flex items-center bg-white dark:bg-[#2b2b2b] border border-[#f0c0b9] dark:border-rose-800/50 rounded-md overflow-hidden input-combo transition-colors">
                  <span className="bg-[#ffe2dd] dark:bg-rose-900/40 text-[#c93f3a] dark:text-[#fb7185] font-semibold px-3 py-1.5 text-[13px] border-r border-[#f0c0b9] dark:border-rose-800/50 transition-colors">사망일</span>
                  <DateInput value={node.deathDate} onKeyDown={onKeyDown} onChange={v => handleUpdate(node.id, 'deathDate', v)} className="w-28 px-3 py-1.5 text-[14px] font-semibold outline-none text-[#37352f] dark:text-[#ffffff] bg-transparent" />
                </div>
              )}

              {isSp && level > 1 && (
                <label className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md border transition-colors cursor-pointer select-none ${node.isRemarried ? 'bg-[#ffebd2] dark:bg-amber-900/40 border-[#e9a23b] dark:border-amber-800/50 text-[#975c0b] dark:text-[#fcd34d]' : 'bg-white dark:bg-[#333333] border-[#cccccc] dark:border-[#555555] hover:bg-[#f1f1ef] dark:hover:bg-[#3c3c3c] text-[#787774] dark:text-[#ffffff]'}`}>
                  <input type="checkbox" checked={node.isRemarried || false} onKeyDown={onKeyDown} onChange={e => handleUpdate(node.id, 'isRemarried', e.target.checked)} className="w-3.5 h-3.5 cursor-pointer accent-[#e9a23b]" />
                  <span className="text-[13px] font-bold">재혼</span>
                </label>
              )}

            </div>

            {/* 💡 삭제 버튼을 해당 카드 가장 뒷쪽으로 이동 */}
            <button type="button" onClick={() => removeHeir(node.id)} onKeyDown={onKeyDown} className="text-[#d4d4d4] dark:text-[#cccccc] hover:text-[#c93f3a] dark:hover:text-red-400 p-1.5 ml-2 shrink-0 rounded opacity-0 group-hover:opacity-100 transition-all" title="삭제">
              <IconTrash2 className="w-5 h-5" />
            </button>
          </div>

          {/* 대습 상속인 컨테이너 (펼치기 상태일 때만 보임) */}
          {node.isDeceased && isExpanded && (
            <div className="mt-2 ml-4 animate-in fade-in slide-in-from-top-2 duration-200">
              {canAutoFill && (
                <div className="mb-2 p-3 bg-[#f7f7f5] dark:bg-[#2b2b2b] border border-[#d4d4d4] dark:border-[#444444] rounded-md text-[13px] flex items-center justify-between no-print shadow-sm transition-colors">
                  <span className="text-[#504f4c] dark:text-[#ffffff] font-semibold flex items-center gap-2 transition-colors"><IconFileText className="w-4 h-4"/> 이 배우자의 상속인을 피상속인의 자녀에서 복사하시겠습니까?</span>
                  <div className="flex gap-2">
                    <button type="button" onClick={() => addHeir(node.id)} className="px-3 py-1 bg-white dark:bg-[#333333] border border-[#cccccc] dark:border-[#555555] text-[#37352f] dark:text-[#ffffff] font-bold rounded hover:bg-[#f1f1ef] dark:hover:bg-[#444444] transition-colors">직접입력</button>
                    <button type="button" onClick={autoFill} className="px-3 py-1 bg-[#37352f] dark:bg-[#0e639c] text-white font-bold rounded hover:bg-[#2f2d27] dark:hover:bg-[#1177bb] transition-colors">자동불러오기</button>
                  </div>
                </div>
              )}
              
              <div className="flex justify-between items-center mb-1 no-print">
                <span className="text-[13px] font-bold text-[#787774] dark:text-[#ffffff] flex items-center pl-2 transition-colors">
                  <IconChevronRight className="h-4 w-4 mr-1" /> 대습/순차 상속인
                </span>
                {!canAutoFill && (
                  <button type="button" onClick={() => addHeir(node.id)} onKeyDown={onKeyDown} className="text-[13px] text-[#504f4c] dark:text-[#ffffff] font-bold hover:bg-[#e9e9e7] dark:hover:bg-[#333333] px-2 py-1 rounded transition-colors flex items-center border border-transparent hover:border-[#cccccc] dark:hover:border-[#555555]">
                    + {node.name ? `${node.name}의 상속인 추가` : '상속인 추가'}
                  </button>
                )}
              </div>
              {node.heirs?.map(h => <HeirRow key={h.id} node={h} level={level+1} handleUpdate={handleUpdate} removeHeir={removeHeir} addHeir={addHeir} siblings={node.heirs} inheritedDate={nextInheritedDate} onKeyDown={onKeyDown} toggleSignal={toggleSignal} />)}
            </div>
          )}
        </div>
      );
    };

    // --- 가계도 렌더링 (반응형/토글형 트리로 업그레이드) ---
    const TreeReportNode = ({ node, level, treeToggleSignal }) => {
      const hasHeirs = node.heirs && node.heirs.length > 0;
      const [isExpanded, setIsExpanded] = useState(level === 0);

      useEffect(() => {
        if (treeToggleSignal > 0) setIsExpanded(true);
        else if (treeToggleSignal < 0) setIsExpanded(level === 0);
      }, [treeToggleSignal, level]);

      const getLevelColor = (lvl, isDead) => {
        if (isDead) return 'text-[#ef4444] dark:text-red-500 font-black'; 
        if (lvl === 0) return 'text-[#0ea5e9] dark:text-sky-400 font-black';
        if (lvl === 1) return 'text-[#22c55e] dark:text-green-400 font-bold';
        if (lvl === 2) return 'text-[#f97316] dark:text-orange-400 font-bold';
        return 'text-[#a855f7] dark:text-purple-400 font-bold';
      };

      return (
        <div className={`relative ${level > 0 ? 'ml-6 pl-4 border-l-2 border-[#d4d4d4] dark:border-[#444444]' : ''} py-1 transition-colors`}>
          <div 
            onClick={() => { if (hasHeirs) setIsExpanded(!isExpanded); }}
            className={`flex items-center gap-2 w-fit py-1.5 px-3 rounded-md transition-all select-none ${hasHeirs ? 'cursor-pointer hover:bg-[#e9e9e7] dark:hover:bg-[#333333] active:scale-[0.98]' : ''} ${isExpanded && hasHeirs && level > 0 ? 'bg-[#f1f1ef] dark:bg-[#333333]' : ''}`}
          >
            <div className={`flex items-center justify-center w-5 h-5 rounded ${hasHeirs ? 'bg-white dark:bg-[#2b2b2b] border border-[#d4d4d4] dark:border-[#555555] shadow-sm' : ''}`}>
              {hasHeirs ? (
                <IconChevronRight className={`w-3.5 h-3.5 text-[#504f4c] dark:text-[#ffffff] transition-transform duration-200 ${isExpanded ? 'rotate-90' : ''}`} />
              ) : (
                <div className="w-1.5 h-1.5 rounded-full bg-[#d4d4d4] dark:border-[#555555]" />
              )}
            </div>
            
            <span className={`tracking-wide transition-colors ${level === 0 ? 'text-[18px]' : 'text-[16px]'} ${getLevelColor(level, node.isDeceased)} ${!isExpanded && hasHeirs ? 'underline decoration-2 underline-offset-4' : ''}`}>
              {node.name}
            </span>
            
            <div className="flex items-center gap-1.5 ml-1">
              <span className="text-[12px] text-[#504f4c] dark:text-[#ffffff] font-bold border border-[#d4d4d4] dark:border-[#555555] bg-[#fbfcfb] dark:bg-[#333333] px-2 py-0.5 rounded shadow-sm">
                {level === 0 ? '피상속인' : relStr[node.relation] || '자녀'}
              </span>
              {node.relation === 'son' && node.isHoju && <span className="text-[12px] text-[#1d4ed8] dark:text-[#7dd3fc] bg-[#bfdbfe] dark:bg-sky-900/40 border border-[#93c5fd] dark:border-sky-800/50 px-2 py-0.5 rounded font-extrabold">호주상속</span>}
              {node.relation === 'daughter' && node.isSameRegister === false && <span className="text-[12px] text-[#b91c1c] dark:text-rose-300 bg-[#fee2e2] dark:bg-rose-900/40 border border-[#fecaca] dark:border-rose-800/50 px-2 py-0.5 rounded font-extrabold">출가녀</span>}
              {node.isDeceased && <span className="text-[12px] text-[#c93f3a] dark:text-[#fb7185] bg-white dark:bg-[#333333] border border-[#c93f3a] dark:border-rose-800/50 px-2 py-0.5 rounded font-extrabold">{node.deathDate} 사망</span>}
            </div>

            {hasHeirs && !isExpanded && (
               <span className="ml-3 text-[12px] text-[#2383e2] dark:text-[#7dd3fc] font-extrabold bg-[#e8f3ff] dark:bg-sky-900/40 border border-[#bfe0ff] dark:border-sky-800/50 px-2.5 py-0.5 rounded-full animate-in fade-in zoom-in duration-200 shadow-sm print:hidden">
                 상속인 {node.heirs.length}명 보기
               </span>
            )}
          </div>
          
          <div className={`grid transition-all duration-300 ease-in-out print:grid-rows-[1fr] print:opacity-100 print:mt-1 ${isExpanded ? 'grid-rows-[1fr] opacity-100 mt-1' : 'grid-rows-[0fr] opacity-0'}`}>
            <div className="overflow-hidden print:overflow-visible">
              {node.heirs && node.heirs.map(h => <TreeReportNode key={h.id} node={h} level={level + 1} treeToggleSignal={treeToggleSignal} />)}
            </div>
          </div>
        </div>
      );
    };

    // --- 인쇄 전용 보고서 컴포넌트 (전용표 방식 - 항상 흰 배경) ---
    const PrintReport = ({ tree, finalShares, calcSteps, formatMoney, formatKorDate, isAmountActive, propertyValue }) => (
      <div className="print-report-container" style={{display:'none'}}>
        <div style={{padding:'0 10px'}}>
          {/* 보고서 헤더 */}
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:'30px', borderBottom:'3px solid black', paddingBottom:'15px'}}>
            <div>
              <h1 style={{fontSize:'22pt', fontWeight:'bold', margin:'0 0 8px 0', color:'black'}}>상속지분 계산 결과 보고서</h1>
              <div style={{fontSize:'11pt', lineHeight:'1.8'}}>
                <div><strong>사건번호:</strong> {tree.caseNo || '(미입력)'}</div>
                <div><strong>피상속인:</strong> <span style={{fontWeight:'bold', textDecoration:'underline'}}>{tree.name || '(미입력)'}</span> ({formatKorDate(tree.deathDate)} 사망)</div>
                {isAmountActive && propertyValue > 0 && <div><strong>총 상속재산:</strong> <span style={{fontWeight:'bold'}}>{formatMoney(propertyValue)} 원</span></div>}
              </div>
            </div>
            <div style={{textAlign:'right', fontSize:'9pt', color:'#888'}}>인쇄일: {new Date().toLocaleDateString('ko-KR')}</div>
          </div>

          {/* 1. 최종 상속 지분 요약 */}
          <section style={{marginBottom:'30px'}}>
            <h2 style={{fontSize:'14pt', fontWeight:'bold', marginBottom:'12px', borderLeft:'4px solid black', paddingLeft:'10px', color:'black'}}>1. 최종 상속 지분 요약</h2>
            <table style={{width:'100%', borderCollapse:'collapse', border:'1px solid #333'}}>
              <thead>

          if (!node.heirs || node.heirs.length === 0) return;

          let distributionDate = inheritedDate;
          if (node.id !== 'root' && node.isDeceased && node.deathDate && !isBefore(node.deathDate, inheritedDate)) {
            distributionDate = node.deathDate;
          }
          
          const law = getLawEra(distributionDate);
          let total = 0;
          
          node.heirs.forEach(h => {
            const isSp = h.relation === 'wife' || h.relation === 'husband';
            const isPre = h.isDeceased && h.deathDate && isBefore(h.deathDate, distributionDate);
            let modifier = ''; 

            if (isSp && isPre) { h.r = 0; h.ex = `${h.deathDate} 피상속인보다 먼저 사망`; }
            else if (isSp && h.isRemarried) { h.r = 0; h.ex = '재혼 상속권 소멸'; }
            else if (!isSp && isPre && (!h.heirs || h.heirs.length === 0)) { h.r = 0; h.ex = '대습상속인 없음'; }
            else if (h.relation === 'wife') { 
               if (law === '1991' || law === '1979') { h.r = 1.5; modifier = '처 5할 가산'; }
               else { h.r = 0.5; modifier = '처 감산 (자녀의 1/2)'; } 
            } else if (h.relation === 'husband') {
               if (law === '1991') { h.r = 1.5; modifier = '남편 5할 가산'; }
               else { h.r = 1.0; } 
            } else {
               if (law === '1991') { h.r = 1.0; }
               else if (law === '1979') {
                 if (h.relation === 'daughter') {
                   if (h.isSameRegister !== false) { h.r = 1.0; }
                   else { h.r = 0.25; modifier = '출가녀 감산 (아들의 1/4)'; }
                 } else if (h.relation === 'son') {
                   if (h.isHoju) { h.r = 1.5; modifier = '호주상속 5할 가산'; }
                   else { h.r = 1.0; }
                 } else h.r = 1.0;
               } else { 
                 if (h.relation === 'daughter') {
                   if (h.isSameRegister !== false) { h.r = 0.5; modifier = '여자 감산 (남자의 1/2)'; }
                   else { h.r = 0.25; modifier = '출가녀 감산 (남자의 1/4)'; }
                 } else if (h.relation === 'son') {
                   if (h.isHoju) { h.r = 1.5; modifier = '호주상속 5할 가산'; }
                   else { h.r = 1.0; }
                 } else h.r = 1.0;
               }
            }
            h.modifierReason = modifier; 
            total += h.r;
          });

          if (total > 0) {
            const step = { dec: node, inN, inD, dists: [] };
            const childrenToTraverse = [];

            node.heirs.forEach(h => {
              if (h.r === 0) { 
                step.dists.push({ h, n: 0, d: 1, sn: 0, sd: 1, ex: h.ex, mod: h.modifierReason }); 
              } else {
                const [sn, sd] = math.simplify(h.r * 100, total * 100);
                const [nn, nd] = math.multiply(inN, inD, sn, sd);
                step.dists.push({ h, n: nn, d: nd, sn, sd, mod: h.modifierReason });
                childrenToTraverse.push({ h, nn, nd });
              }
            });
            steps.push(step);
            childrenToTraverse.forEach(child => { traverse(child.h, child.nn, child.nd, distributionDate); });
          }
        };

        const initN = Math.max(1, Number(tree.shareN) || 1);
        const initD = Math.max(1, Number(tree.shareD) || 1);
        traverse(tree, initN, initD, tree.deathDate);
        
        const merged = [];
        results.forEach(r => {
          const ex = merged.find(m => m.name === r.name);
          if (ex) { 
            const [nn, nd] = math.add(ex.n, ex.d, r.n, r.d); 
            ex.n = nn; ex.d = nd; 
          } else { merged.push({...r}); }
        });

        let commonD = 1;
        merged.forEach(m => { if (m.n > 0) commonD = math.lcm(commonD, m.d); });
        merged.forEach(m => {
          if (m.n === 0) { m.un = 0; m.ud = commonD; } 
          else { const multiplier = commonD / m.d; m.un = m.n * multiplier; m.ud = commonD; }
        });

        const categoryMap = {};
        tree.heirs.forEach((h, idx) => { if (!h.isDeceased) categoryMap[h.name] = { type: 'direct', order: idx }; });
        tree.heirs.forEach((h, idx) => {
          if (h.isDeceased && h.relation !== 'wife' && h.relation !== 'husband') {
            const traverseSub = (node) => {
              if (!node.isDeceased && !categoryMap[node.name]) categoryMap[node.name] = { type: 'sub', ancestor: h, order: idx };
              if (node.heirs) node.heirs.forEach(traverseSub);
            };
            if (h.heirs) h.heirs.forEach(traverseSub);
          }
        });
        tree.heirs.forEach((h, idx) => {
          if (h.isDeceased && (h.relation === 'wife' || h.relation === 'husband')) {
            const traverseSub = (node) => {
              if (!node.isDeceased && !categoryMap[node.name]) categoryMap[node.name] = { type: 'sub', ancestor: h, order: idx };
              if (node.heirs) node.heirs.forEach(traverseSub);
            };
            if (h.heirs) h.heirs.forEach(traverseSub);
          }
        });

        const directShares = [];
        const subMap = {};

        merged.forEach(m => {
          const cat = categoryMap[m.name];
          if (!cat || cat.type === 'direct') { directShares.push(m); } 
          else {
            const ancId = cat.ancestor.id;
            if (!subMap[ancId]) subMap[ancId] = { ancestor: cat.ancestor, order: cat.order, shares: [] };
            subMap[ancId].shares.push(m);
          }
        });

        const subGroups = Object.values(subMap).sort((a, b) => a.order - b.order);
        setFinalShares({ direct: directShares, subGroups: subGroups }); 
        setCalcSteps(steps);

                      <p>※ 본 계산서는 대습 및 순차 상속 법리를 기초로 산출되었습니다.</p>
                      <p>※ 상속 개시 시점(사망일)에 따른 1960년, 1979년, 1991년 개정 민법 비율이 자동 적용되었습니다.</p>
                      {isAmountActive && <p className="text-[#0b6e99] dark:text-[#60a5fa] font-bold mt-2">※ 계산된 상속 금액은 원 단위 이하를 내림하여 표기하였습니다.</p>}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
          <PrintReport 
            tree={tree} 
            finalShares={finalShares} 
            calcSteps={calcSteps} 
            formatMoney={formatMoney} 
            formatKorDate={formatKorDate} 
            isAmountActive={isAmountActive}
            propertyValue={propertyValue}
          />
        </div>
        </div>
      );
    }



    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
